{{- if and .Values.headplane.enabled .Values.headplane.oidc.enabled (not .Values.headplane.oidc.existingSecret) .Values.headplane.oidc.clientSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-headplane-oidc" (include "common.names.fullname" .) }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: headplane
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
type: Opaque
data:
  client_secret: {{ .Values.headplane.oidc.clientSecret | b64enc | quote }}
{{- end }}
