{{- if .Values.headplane.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-headplane" (include "common.names.fullname" .) }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: headplane
  {{- if or .Values.headplane.service.annotations .Values.commonAnnotations }}
  {{- $annotations := include "common.tplvalues.merge" (dict "values" (list .Values.headplane.service.annotations .Values.commonAnnotations) "context" .) }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" $annotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.headplane.service.type }}
  {{- if and .Values.headplane.service.clusterIP (eq .Values.headplane.service.type "ClusterIP") }}
  clusterIP: {{ .Values.headplane.service.clusterIP }}
  {{- end }}
  ports:
    - name: headplane
      port: {{ .Values.headplane.service.port }}
      targetPort: headplane
      protocol: TCP
      {{- if and (or (eq .Values.headplane.service.type "NodePort") (eq .Values.headplane.service.type "LoadBalancer")) (not (empty .Values.headplane.service.nodePort)) }}
      nodePort: {{ .Values.headplane.service.nodePort }}
      {{- else if eq .Values.headplane.service.type "ClusterIP" }}
      nodePort: null
      {{- end }}
  {{- $podLabels := include "common.tplvalues.merge" (dict "values" (list .Values.headscale.podLabels .Values.commonLabels) "context" .) | fromYaml }}
  selector: {{- include "common.labels.matchLabels" ( dict "customLabels" $podLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: headscale
{{- end }}
